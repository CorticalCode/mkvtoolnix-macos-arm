name: Build MKVToolNix macOS ARM64

on:
  schedule:
    # Check for new upstream releases weekly on Mondays at 06:00 UTC
    - cron: '0 6 * * 1'
  workflow_dispatch:
    inputs:
      tag:
        description: 'Upstream release tag (e.g. release-98.0)'
        required: true
        default: 'release-98.0'
      force:
        description: 'Force rebuild even if release exists'
        required: false
        type: boolean
        default: false

jobs:
  check-release:
    runs-on: ubuntu-latest
    outputs:
      tag: ${{ steps.resolve.outputs.tag }}
      version: ${{ steps.resolve.outputs.version }}
      should_build: ${{ steps.resolve.outputs.should_build }}
    steps:
      - name: Resolve tag
        id: resolve
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            TAG="${{ github.event.inputs.tag }}"
          else
            # Find latest upstream release tag
            TAG=$(git ls-remote --tags --sort=-v:refname \
              https://codeberg.org/mbunkus/mkvtoolnix.git \
              'refs/tags/release-*' | head -1 | sed 's|.*refs/tags/||')
          fi
          VERSION=${TAG#release-}
          echo "tag=${TAG}" >> "$GITHUB_OUTPUT"
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"
          echo "Resolved: ${TAG} (version ${VERSION})"

          # Check if we already have any release for this version
          FORCE="${{ github.event.inputs.force }}"
          if [[ "${FORCE}" == "true" ]]; then
            echo "should_build=true" >> "$GITHUB_OUTPUT"
            echo "Force build requested."
          elif gh release list --repo "${{ github.repository }}" --limit 50 | grep -q "v${VERSION}"; then
            echo "should_build=false" >> "$GITHUB_OUTPUT"
            echo "Release for v${VERSION} already exists, skipping."
          else
            echo "should_build=true" >> "$GITHUB_OUTPUT"
            echo "New version ${VERSION} detected, will build."
          fi

  build:
    needs: check-release
    if: needs.check-release.outputs.should_build == 'true'
    runs-on: macos-15
    env:
      TAG: ${{ needs.check-release.outputs.tag }}
      VERSION: ${{ needs.check-release.outputs.version }}
    steps:
      - uses: actions/checkout@v4
        with:
          lfs: true

      # Layer 1: GitHub Actions cache (ephemeral, 7-day TTL)
      - name: Restore dependency cache
        id: dep-cache
        uses: actions/cache@v4
        with:
          path: |
            ~/opt/packages
            ~/opt/source
          key: deps-${{ hashFiles('patches/zlib-url-fix.patch', 'patches/qt-version-bump-6.10.2.patch') }}
          restore-keys: |
            deps-

      # Layer 2: Git LFS (permanent, if cache missed and LFS has deps)
      - name: Restore deps from LFS
        if: steps.dep-cache.outputs.cache-hit != 'true'
        run: |
          if [[ -d "lfs-deps" ]] && ls lfs-deps/*.tar.gz &>/dev/null; then
            echo "Restoring deps from LFS..."
            mkdir -p ~/opt/packages
            cp lfs-deps/*.tar.gz ~/opt/packages/
          else
            echo "No LFS deps available, will build from source."
          fi

      - name: Build MKVToolNix
        run: ./build-local.sh "${TAG}"
        timeout-minutes: 180

      - name: Rename DMG
        run: |
          mv ~/tmp/compile/MKVToolNix-${VERSION}.dmg \
             ~/tmp/compile/MKVToolNix-${VERSION}-macos-arm.dmg

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "v${VERSION}-arm64" \
            --repo "${{ github.repository }}" \
            --title "MKVToolNix ${VERSION} — macOS ARM" \
            --notes "$(cat <<NOTES
          Unofficial macOS ARM64 build of [MKVToolNix ${VERSION}](https://mkvtoolnix.download/).

          Built from upstream tag \`${TAG}\` with Qt 6.10.2, Boost 1.88.0.

          **Not signed or notarized.** To open: right-click the app > Open, or run:
          \`\`\`
          xattr -cr /Applications/MKVToolNix*.app
          \`\`\`

          See [PATCHES.md](https://github.com/${{ github.repository }}/blob/main/PATCHES.md) for build patches.
          See [CHANGELOG.md](https://github.com/${{ github.repository }}/blob/main/CHANGELOG.md) for build history.

          Source: https://codeberg.org/mbunkus/mkvtoolnix/src/tag/${TAG}
          NOTES
          )" \
            ~/tmp/compile/MKVToolNix-${VERSION}-macos-arm.dmg

      - name: Create issue on build failure
        if: failure()
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh issue create \
            --repo "${{ github.repository }}" \
            --title "Build failed: MKVToolNix ${VERSION} (${TAG})" \
            --label "build" \
            --body "$(cat <<BODY
          Automated build failed for MKVToolNix ${VERSION} from tag \`${TAG}\`.

          **Workflow run:** ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}

          This likely means upstream changes broke one of our patches.
          Check the workflow logs for the specific error and update patches accordingly.
          BODY
          )"
