name: Build MKVToolNix macOS

on:
  schedule:
    # Check for new upstream releases weekly on Mondays at 06:00 UTC
    - cron: '0 6 * * 1'
  workflow_dispatch:
    inputs:
      tag:
        description: 'Upstream release tag (e.g. release-98.0)'
        required: true
        default: 'release-98.0'
      force:
        description: 'Force rebuild even if release exists'
        required: false
        type: boolean
        default: false

jobs:
  check-release:
    runs-on: ubuntu-latest
    outputs:
      tag: ${{ steps.resolve.outputs.tag }}
      version: ${{ steps.resolve.outputs.version }}
      should_build: ${{ steps.resolve.outputs.should_build }}
    steps:
      - name: Resolve tag
        id: resolve
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            TAG="${{ github.event.inputs.tag }}"
          else
            # Find latest upstream release tag (filter ^{} peeled refs)
            TAG=$(git ls-remote --tags --refs --sort=-v:refname \
              https://codeberg.org/mbunkus/mkvtoolnix.git \
              'refs/tags/release-*' | head -1 | sed 's|.*refs/tags/||')
          fi
          VERSION=${TAG#release-}
          echo "tag=${TAG}" >> "$GITHUB_OUTPUT"
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"
          echo "Resolved: ${TAG} (version ${VERSION})"

          # Check if we already have any release for this version
          FORCE="${{ github.event.inputs.force }}"
          if [[ "${FORCE}" == "true" ]]; then
            echo "should_build=true" >> "$GITHUB_OUTPUT"
            echo "Force build requested."
          elif gh release list --repo "${{ github.repository }}" --limit 50 | grep -q "v${VERSION}"; then
            echo "should_build=false" >> "$GITHUB_OUTPUT"
            echo "Release for v${VERSION} already exists, skipping."
          else
            echo "should_build=true" >> "$GITHUB_OUTPUT"
            echo "New version ${VERSION} detected, will build."
          fi

  build:
    needs: check-release
    if: needs.check-release.outputs.should_build == 'true'
    runs-on: macos-15
    env:
      TAG: ${{ needs.check-release.outputs.tag }}
      VERSION: ${{ needs.check-release.outputs.version }}
    steps:
      - uses: actions/checkout@v4

      # Layer 1: GitHub Actions cache (ephemeral, 7-day TTL)
      - name: Restore dependency cache
        id: dep-cache
        uses: actions/cache@v4
        with:
          path: |
            ~/opt/packages
            ~/opt/source
          key: deps-${{ hashFiles('patches/*.patch') }}
          restore-keys: |
            deps-

      # Layer 2: Git LFS proven cache (if Actions cache missed)
      # .lfsconfig excludes proven/ from auto-download, so we pull explicitly
      - name: Restore deps from LFS proven cache
        if: steps.dep-cache.outputs.cache-hit != 'true'
        run: |
          ARCH_LABEL="arm"
          if [[ -d "proven/${ARCH_LABEL}" ]]; then
            echo "Pulling proven cache from LFS for ${ARCH_LABEL}..."
            git lfs pull --include="proven/${ARCH_LABEL}/" --exclude=""
            if ls proven/${ARCH_LABEL}/*.tar.gz &>/dev/null; then
              mkdir -p ~/opt/proven/${ARCH_LABEL}
              cp proven/${ARCH_LABEL}/*.tar.gz ~/opt/proven/${ARCH_LABEL}/
              echo "Restored $(ls proven/${ARCH_LABEL}/*.tar.gz | wc -l) packages."
              # Clean up working copy to save runner disk space
              GIT_LFS_SKIP_SMUDGE=1 git checkout -- "proven/${ARCH_LABEL}/"
              git lfs prune
            else
              echo "No LFS proven cache available, will build from source."
            fi
          else
            echo "No proven directory for ${ARCH_LABEL}, will build from source."
          fi

      - name: Build MKVToolNix
        run: ./build-local.sh "${TAG}"
        timeout-minutes: 180

      - name: Rename DMG for release
        run: |
          mv ~/tmp/compile/MKVToolNix-${VERSION}.dmg \
             ~/tmp/compile/MKVToolNix-${VERSION}-macos-apple-silicon.dmg

      - name: Determine CalVer tag
        id: calver
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          YEAR=$(date +%Y)
          MONTH=$(date +%m)
          # Find highest existing sequence number for this version+month
          SEQ=$(gh release list --repo "${{ github.repository }}" --limit 50 \
            | grep -oP "v${VERSION}-b${YEAR}\.${MONTH}\.\K[0-9]+" \
            | sort -rn | head -1 || echo "0")
          SEQ=$((${SEQ:-0} + 1))
          TAG_NAME="v${VERSION}-b${YEAR}.${MONTH}.${SEQ}"
          echo "tag_name=${TAG_NAME}" >> "$GITHUB_OUTPUT"
          echo "CalVer tag: ${TAG_NAME}"

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          CALVER="${{ steps.calver.outputs.tag_name }}"
          gh release create "${CALVER}" \
            --repo "${{ github.repository }}" \
            --title "MKVToolNix ${VERSION} — macOS (${CALVER})" \
            --notes "$(cat <<NOTES
          Unofficial macOS build of [MKVToolNix ${VERSION}](https://mkvtoolnix.download/).

          ## Downloads

          | Architecture | File |
          |-------------|------|
          | Apple Silicon (arm64) | \`MKVToolNix-${VERSION}-macos-apple-silicon.dmg\` |

          Not sure which? Apple menu > About This Mac. "Apple M_" = Apple Silicon, "Intel Core" = Intel.

          ## Build Details

          - **Upstream:** MKVToolNix ${VERSION} (\`${TAG}\`)
          - **Target:** macOS 13+

          **Automated build.** This release was built and published by CI without manual testing. Post-build verification (Qt version, architecture, duplicate dylibs, Homebrew library leak detection, app size) passed automatically. If you encounter issues, please [report them](https://github.com/${{ github.repository }}/issues).

          ## Installation

          **Not signed or notarized.** To open: right-click the app > Open, or run:
          \`\`\`
          xattr -cr /Applications/MKVToolNix*.app
          \`\`\`

          [Build patches](https://github.com/${{ github.repository }}/blob/main/PATCHES.md) |
          [Changelog](https://github.com/${{ github.repository }}/blob/main/CHANGELOG.md) |
          [Source](https://codeberg.org/mbunkus/mkvtoolnix/src/tag/${TAG})
          NOTES
          )" \
            ~/tmp/compile/MKVToolNix-${VERSION}-macos-apple-silicon.dmg

      - name: Create issue on build failure
        if: failure()
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh issue create \
            --repo "${{ github.repository }}" \
            --title "Build failed: MKVToolNix ${VERSION} (${TAG})" \
            --label "build" \
            --body "$(cat <<BODY
          Automated build failed for MKVToolNix ${VERSION} from tag \`${TAG}\`.

          **Workflow run:** ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}

          This likely means upstream changes broke one of our patches.
          Check the workflow logs for the specific error and update patches accordingly.
          BODY
          )"
